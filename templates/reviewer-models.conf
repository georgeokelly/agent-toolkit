# Reviewer model configuration for multi-model review
#
# Each line defines a reviewer sub-agent variant.
# Format: model-id:short-name:Display Name
#
#   model-id      Cursor model identifier (goes into agent frontmatter `model:`)
#   short-name    File suffix: reviewer-<short-name>.md
#   Display Name  Human-readable name for report headings
#
# Lines starting with # are comments. Empty lines are ignored.
#
# After editing, run `agent-sync .` to regenerate reviewer sub-agent files.
# Or let the parent agent auto-detect changes on the next multi-model /review.
#
# Default models — comment out or remove lines you don't need, add your own below.
claude-opus-4-7-thinking-max:opus-max:Claude 4.7 Opus Max
kimi-k2.5:kimi:Kimi K2.5
gpt-5.4-xhigh:gpt54:GPT-5.4
gpt-5.3-codex-xhigh:codex:GPT-5.3 Codex
gemini-3.1-pro:gemini:Gemini 3.1 Pro
grok-4-20-thinking:grok:Grok 4.20
